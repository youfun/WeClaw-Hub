name = "weclaw-hub-deploy"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# OAuth client credentials (self-managed OAuth client)
[vars]
# Cloudflare OAuth client ID - set via wrangler secret or here for testing
# CLOUDflare_OAUTH_CLIENT_ID will be set as secret

# Deployment service config
WECLAW_DEPLOYER_VERSION = "0.1.0"

# CORS origins for deploy wizard
# DEPLOY_WIZARD_ORIGIN can be set to your frontend domain
