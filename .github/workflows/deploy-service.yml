name: Deploy Service

on:
  push:
    branches: [main]
    paths:
      - "deploy-service/**"
      - ".github/workflows/deploy-service.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: deploy-service
        run: bun install

      - name: Deploy to Cloudflare
        working-directory: deploy-service
        run: |
          bunx wrangler deploy
          bunx wrangler secret put CLOUDFLARE_OAUTH_CLIENT_ID <<< "${{ secrets.DEPLOY_SERVICE_OAUTH_CLIENT_ID }}"
          bunx wrangler secret put CLOUDFLARE_OAUTH_CLIENT_SECRET <<< "${{ secrets.DEPLOY_SERVICE_OAUTH_CLIENT_SECRET }}"
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}