name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Cloudflare tests (vitest)
        run: bun run test
      - name: Local adapter tests (bun test)
        run: bun test src/__tests__/local/

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Start container and health check
        run: |
          docker run -d --name weclaw-ci -p 8787:8787 \
            -e AUTH_TOKEN=ci-token \
            $(docker build -q .)
          sleep 3
          curl -s --fail http://localhost:8787/health || (docker logs weclaw-ci && exit 1)
          echo "✅ Health check passed"
      - name: Cleanup
        if: always()
        run: docker rm -f weclaw-ci